name: Deploy Frontend to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"

env:
  GCP_PROJECT_ID: project-dev-496407
  REGION: us-central1

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: Build and push Docker image to Artifact Registry
        run: |
          gcloud builds submit frontend \
            --config=frontend/cloudbuild.yaml \
            --substitutions=_REGION=${{ env.REGION }},_SERVICE_NAME=loan-frontend

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy loan-frontend \
            --image=${{ env.REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/loan-app/loan-frontend:latest \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --set-env-vars="VITE_API_URL=${{ secrets.BACKEND_URL }}" \
            --memory=512Mi \
            --timeout=3600s \
            --max-instances=10
